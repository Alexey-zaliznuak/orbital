version: '3'

vars:
  DOCKER_COMPOSE_FILE: deploy/docker/docker-compose.yml

tasks:
  default:
    desc: Build and start all services
    deps:
      - start-all

  start-all:
    desc: Build (с кэшем) and start all services
    cmds:
      - task: build-all
      - docker compose -f {{.DOCKER_COMPOSE_FILE}} up

  build-all:
    desc: Build all Docker images
    deps:
      - swagger
    cmds:
      - docker compose -f {{.DOCKER_COMPOSE_FILE}} build

  run-all:
    desc: Start all services (docker-compose up)
    cmds:
      - docker compose -f {{.DOCKER_COMPOSE_FILE}} up

  flush-all:
    desc: Stop services and remove volumes
    cmds:
      - docker compose -f {{.DOCKER_COMPOSE_FILE}} down -v

  build:
    desc: Build Go binaries locally
    cmds:
      - go build ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...

  send-messages:
    desc: Send messages to gateway
    cmds:
      - go run cmd/scripts/send-messages/main.go

  swagger:
    desc: Generate Swagger documentation for coordinator, gateway and in-memory storage
    cmds:
      - swag init -g doc.go --dir internal/coordinator/http -o docs/swagger-coordinator --parseDependency
      - swag init -g server.go --dir internal/gateway/http -o docs/swagger-gateway --parseDependency
      - swag init -g doc.go --dir internal/storages/in_memory -o docs/swagger-in-memory --parseDependency

  infra-up:
    desc: Start only infrastructure (nats, etcd)
    cmds:
      - docker compose -f {{.DOCKER_COMPOSE_FILE}} up -d nats etcd

  logs:
    desc: Show logs from all services
    cmds:
      - docker compose -f {{.DOCKER_COMPOSE_FILE}} logs -f
